<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128" width="64" height="128" role="img" aria-label="closing bracket">
  <title>bracket right</title>
  <desc>Oversized ASCII-style closing bracket with internal ticks.</desc>
  <g fill="none" stroke="#3FB950" stroke-width="4" stroke-linecap="square">
    <polyline points="24,8 48,8 48,120 24,120"/>
  </g>
  <g fill="none" stroke="#3FB950" stroke-width="2">
    <line x1="48" y1="32"  x2="36" y2="32"/>
    <line x1="48" y1="56"  x2="40" y2="56"/>
    <line x1="48" y1="80"  x2="40" y2="80"/>
    <line x1="48" y1="104" x2="36" y2="104"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128" width="64" height="128" role="img" aria-label="opening bracket">
  <title>bracket left</title>
  <desc>Oversized ASCII-style opening bracket with internal ticks.</desc>
  <g fill="none" stroke="#3FB950" stroke-width="4" stroke-linecap="square">
    <polyline points="40,8 16,8 16,120 40,120"/>
  </g>
  <g fill="none" stroke="#3FB950" stroke-width="2">
    <line x1="16" y1="32"  x2="28" y2="32"/>
    <line x1="16" y1="56"  x2="24" y2="56"/>
    <line x1="16" y1="80"  x2="24" y2="80"/>
    <line x1="16" y1="104" x2="28" y2="104"/>
  </g>
</svg>
